{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>🏔️ SKN APEX</h1>
        <h2>Create Account</h2>
        <div id="errorMessage" style="color:#ff4444; text-align:center; display:none;"></div>
        <div id="successMessage" style="color:#00ff64; text-align:center; display:none;"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Car Number</label>
                <input type="text" id="car_number" placeholder="DL 01 AB 1234" required>
            </div>
            <div class="form-group">
                <label>Car Model</label>
                <input type="text" id="car_model" placeholder="Maruti Ertiga">
            </div>
            <div class="form-group">
                <label>Car Type</label>
                <select id="car_type">
                    <option value="hatchback">Hatchback</option>
                    <option value="sedan">Sedan</option>
                    <option value="suv">SUV</option>
                    <option value="luxury">Luxury</option>
                </select>
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const car_number = document.getElementById('car_number').value.trim().toUpperCase();
    const car_model = document.getElementById('car_model').value.trim();
    const car_type = document.getElementById('car_type').value;

    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    if (!name || !email || !phone || !password || !car_number) {
        errorDiv.textContent = 'All fields are required!';
        errorDiv.style.display = 'block';
        return;
    }

    const btn = document.getElementById('registerBtn');
    btn.textContent = 'Registering...';
    btn.disabled = true;

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, email, phone, password, car_number, car_model, car_type})
        });

        const result = await response.json();

        if (result.status === 'success') {
            // ✅ No token needed - session is set by backend
            successDiv.textContent = 'Registration successful!';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            errorDiv.textContent = result.error || 'Registration failed.';
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
    } finally {
        btn.textContent = 'Register';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
