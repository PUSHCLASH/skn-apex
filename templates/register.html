{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>🏔️ SKN APEX</h1>
        <h2>Create Account</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Car Number</label>
                <input type="text" id="car_number" placeholder="DL 01 AB 1234" required>
            </div>
            <div class="form-group">
                <label>Car Model</label>
                <input type="text" id="car_model" placeholder="Maruti Ertiga">
            </div>
            <div class="form-group">
                <label>Car Type</label>
                <select id="car_type">
                    <option value="hatchback">Hatchback</option>
                    <option value="sedan">Sedan</option>
                    <option value="suv">SUV</option>
                    <option value="luxury">Luxury</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Register</button>
        </form>
        <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        car_number: document.getElementById('car_number').value,
        car_model: document.getElementById('car_model').value,
        car_type: document.getElementById('car_type').value
    };
    const response = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await response.json();
    if (result.status === 'success') {
        localStorage.setItem('token', result.token);
        window.location.href = '/dashboard';
    } else {
        alert(result.error);
    }
});
</script>
{% endblock %}
