<script>
document.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    // Fetch queue status
    try {
        const queueRes = await fetch('/api/queue/status');
        const queueData = await queueRes.json();
        document.getElementById('queueCount').textContent = queueData.total || 0;
    } catch (e) {}

    // Fetch profile
    try {
        const profileRes = await fetch('/api/profile', {
            headers: {'Authorization': `Bearer ${token}`}
        });
        const profile = await profileRes.json();
        if (profile.star_rating) {
            document.getElementById('starCount').textContent = profile.star_rating;
            document.getElementById('starDisplay').innerHTML = '⭐'.repeat(profile.star_rating);
        }
        document.getElementById('creditCount').textContent = profile.credits || 0;
        if (!profile.subscription_type) {
            document.getElementById('subscriptionBanner').style.display = 'block';
        }
    } catch (e) {}
});
</script>
