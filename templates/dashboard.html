{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>Welcome, {{ user.name }}!</h1>
        <div class="star-rating" id="starDisplay"></div>
    </div>

    <div class="dashboard-stats">
        <div class="stat-card">
            <span class="stat-icon">⏰</span>
            <span class="stat-number" id="queueCount">0</span>
            <span class="stat-label">Cars in Queue</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">💳</span>
            <span class="stat-number" id="creditCount">{{ user.credits or 0 }}</span>
            <span class="stat-label">Available Credits</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon">⭐</span>
            <span class="stat-number" id="starCount">0</span>
            <span class="stat-label">Your Rating</span>
        </div>
    </div>

    <div class="quick-actions">
        <a href="/queue" class="action-btn primary">Join Queue</a>
        <a href="/payment" class="action-btn">Pay Now</a>
        <a href="/subscriptions" class="action-btn">Subscribe</a>
    </div>

    <div class="subscription-banner" id="subscriptionBanner" style="display: none;">
        <p>💎 Get VIP treatment! <a href="/subscriptions">Subscribe now</a></p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = '/login';
        return;
    }

    // Load queue status
    fetch('/api/queue/status')
        .then(res => res.json())
        .then(data => {
            document.getElementById('queueCount').textContent = data.total || 0;
        })
        .catch(err => console.log('Queue load error:', err));

    // Load profile
    fetch('/api/profile', {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(res => res.json())
    .then(data => {
        if (data.star_rating) {
            document.getElementById('starCount').textContent = data.star_rating;
            document.getElementById('starDisplay').innerHTML = '⭐'.repeat(data.star_rating);
        }
        if (data.credits !== undefined) {
            document.getElementById('creditCount').textContent = data.credits;
        }
        if (!data.subscription_type) {
            document.getElementById('subscriptionBanner').style.display = 'block';
        }
    })
    .catch(err => console.log('Profile load error:', err));
});
</script>
{% endblock %}
