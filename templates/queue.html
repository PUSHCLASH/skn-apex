{% extends "base.html" %}

{% block content %}
<div class="queue-container">
    <h1 style="font-size:1.4rem; margin-bottom:4px;">📍 Live Queue</h1>
    <p style="color:#888; font-size:0.85rem; margin-bottom:16px;">Real-time updates</p>

    <div class="queue-status">
        <div class="status-card">
            <span class="label">Your Token</span>
            <span class="value" id="userToken">-</span>
        </div>
        <div class="status-card">
            <span class="label">Your Position</span>
            <span class="value" id="userPosition">-</span>
        </div>
        <div class="status-card">
            <span class="label">Est. Wait</span>
            <span class="value" id="estWait">-</span>
        </div>
    </div>

    <button class="btn-primary" onclick="joinQueue()" style="width:100%;">⚡ Join Queue</button>

    <div style="margin-top: 16px; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.05);">
        <h3 style="font-size:0.9rem; color:#aaa; margin-bottom:8px;">Current Queue</h3>
        <div id="queueList">
            <p style="color:#888; text-align:center; font-size:0.85rem;">Loading queue...</p>
        </div>
    </div>
</div>

<script>
let token = '';

async function joinQueue() {
    try {
        const response = await fetch('/api/queue/join', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        const result = await response.json();

        if (result.status === 'success') {
            document.getElementById('userToken').textContent = result.token;
            document.getElementById('userPosition').textContent = result.position;
            document.getElementById('estWait').textContent = result.estimated_wait + ' min';
            document.getElementById('creditCount').textContent = result.credits_remaining || 0;
            alert('✅ You joined the queue! Token: ' + result.token);
            loadQueue();
        } else {
            alert(result.error || 'Failed to join queue');
        }
    } catch (error) {
        alert('Network error. Please try again.');
    }
}

async function loadQueue() {
    try {
        const response = await fetch('/api/queue/status');
        const data = await response.json();

        const list = document.getElementById('queueList');
        list.innerHTML = '';

        if (data.waiting && data.waiting.length > 0) {
            data.waiting.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <span class="position">#${item.position}</span>
                    <span class="car">${item.car_number}</span>
                    <span class="status ${item.status}">${item.status}</span>
                `;
                list.appendChild(div);
            });
        } else {
            list.innerHTML = '<p style="color:#888; text-align:center; font-size:0.85rem;">No cars in queue 🎉</p>';
        }
    } catch (error) {
        console.error('Queue load error:', error);
    }
}

document.addEventListener('DOMContentLoaded', loadQueue);
setInterval(loadQueue, 5000);
</script>
{% endblock %}
