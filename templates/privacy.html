{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box" style="max-width:500px;">
        <h1>🔒 {{ data.title }}</h1>
        <div style="max-height: 400px; overflow-y: auto; padding: 10px 0; color: #ccc; font-size: 0.9rem; line-height: 1.8; white-space: pre-wrap;">
            {{ data.content }}
        </div>
        <div style="margin-top:20px; display:flex; gap:12px;">
            <a href="/register" class="btn-secondary" style="flex:1; text-align:center; text-decoration:none; padding:12px;">← Back</a>
            <button onclick="window.location.href='/register'" class="btn-primary" style="flex:1;">I Agree</button>
        </div>
    </div>
</div>
{% endblock %}
