{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>⛽ SKN APEX</h1>
        <h2>Welcome Back</h2>

        <div id="errorMessage" style="color:#ff4444; text-align:center; margin-bottom:10px; display:none;"></div>
        <div id="successMessage" style="color:#00ff64; text-align:center; margin-bottom:10px; display:none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn" style="width:100%;">Login</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        errorDiv.textContent = 'Email and password are required!';
        errorDiv.style.display = 'block';
        return;
    }

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });

        const result = await response.json();

        if (result.status === 'success') {
            successDiv.textContent = '✅ Login successful! Redirecting...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            errorDiv.textContent = result.error || 'Login failed.';
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'block';
    } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
