{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1>🏔️ SKN APEX</h1>
        <h2>Welcome Back</h2>

        <div id="errorMessage" style="color:#ff4444; text-align:center; margin-bottom:10px; display:none;"></div>
        <div id="successMessage" style="color:#00ff64; text-align:center; margin-bottom:10px; display:none;"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">Login</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>

<script>
async function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    if (!email || !password) {
        errorDiv.textContent = 'Email and password are required!';
        errorDiv.style.display = 'block';
        return;
    }

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const result = await response.json();

        if (result.status === 'success') {
            localStorage.setItem('token', result.token);
            successDiv.textContent = 'Login successful! Redirecting...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            errorDiv.textContent = result.error || 'Login failed. Please check your credentials.';
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Network error. Please check your internet connection.';
        errorDiv.style.display = 'block';
    } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
