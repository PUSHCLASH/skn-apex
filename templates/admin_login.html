<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SKN APEX</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box admin-auth">
            <h1>🔐 Admin Login</h1>
            <p class="subtitle" style="color:#888; text-align:center; font-size:0.85rem;">Face Verification Required</p>

            <div id="errorMessage" style="color:#ff4444; text-align:center; display:none;"></div>
            <div id="successMessage" style="color:#00ff64; text-align:center; display:none;"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin ID</label>
                    <input type="text" id="admin_id" placeholder="Enter Admin ID" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                </div>

                <div class="form-group" id="faceCaptureSection">
                    <label>Face Verification</label>
                    <div class="face-capture-box">
                        <video id="faceVideo" autoplay playsinline></video>
                        <canvas id="faceCanvas" style="display:none;"></canvas>
                        <button type="button" id="captureFaceBtn" class="btn-secondary" style="margin-top:10px;">📸 Capture Face</button>
                        <p id="faceStatus" style="color:#888; font-size:0.8rem; margin-top:6px;">Click "Capture Face" to verify</p>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="adminLoginBtn" style="width:100%;">Login as Admin</button>
            </form>

            <p class="auth-link"><a href="/">← Back to Home</a></p>
        </div>
    </div>

    <script>
        let faceImageData = null;
        const video = document.getElementById('faceVideo');
        const canvas = document.getElementById('faceCanvas');
        const context = canvas.getContext('2d');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) {
                document.getElementById('faceStatus').textContent = '❌ Camera access denied. Please allow camera.';
            }
        }

        document.getElementById('captureFaceBtn').addEventListener('click', function() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            faceImageData = canvas.toDataURL('image/png');
            document.getElementById('faceStatus').textContent = '✅ Face captured successfully!';
            document.getElementById('faceStatus').style.color = '#00ff64';
            this.textContent = '✅ Captured';
            this.disabled = true;
        });

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const admin_id = document.getElementById('admin_id').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!admin_id || !password) {
                errorDiv.textContent = 'Admin ID and Password required!';
                errorDiv.style.display = 'block';
                return;
            }

            if (!faceImageData) {
                errorDiv.textContent = 'Please capture your face first!';
                errorDiv.style.display = 'block';
                return;
            }

            const btn = document.getElementById('adminLoginBtn');
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({admin_id, password, face_data: faceImageData})
                });
                const result = await response.json();

                if (result.status === 'success') {
                    successDiv.textContent = '✅ Admin login successful! Redirecting...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/admin-dashboard';
                    }, 1500);
                } else {
                    errorDiv.textContent = result.error || 'Login failed.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = 'Login as Admin';
                btn.disabled = false;
            }
        });

        startCamera();
    </script>

    <style>
        .admin-auth { max-width: 420px !important; }
        .face-capture-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.1);
        }
        .face-capture-box video {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            background: #000;
        }
        .face-capture-box .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</body>
</html>
