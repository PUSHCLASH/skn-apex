services:
  - type: web
    name: skn-apex
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=4 --threads=2 --timeout=120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12
    healthCheckPath: /health
    numReplicas: 1
    plan: starter
